<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SeaRoutes — Greek ferry routes & fares</title>
  <meta name="description" content="Search Greek ferry routes, schedules and fares across Blue Star, Hellenic Seaways, ANEK, Zante & Minoan. Open data from data.gov.gr." />
  <meta name="theme-color" content="#0b1020" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9B%B4%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">⛴</span>
      <div>
        <h1>Sea&nbsp;Routes</h1>
        <p class="tagline">Greek ferry routes &amp; fares · <span id="dataYear">…</span> open data</p>
      </div>
    </div>
    <button id="themeBtn" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">◐</button>
  </header>

  <section class="controls">
    <div class="port-row">
      <label class="field">
        <span class="field-lbl">From</span>
        <select id="fromSel" aria-label="Departure port"></select>
      </label>
      <button id="swapBtn" class="swap" title="Swap" aria-label="Swap ports">⇄</button>
      <label class="field">
        <span class="field-lbl">To</span>
        <select id="toSel" aria-label="Arrival port"></select>
      </label>
    </div>
    <div class="filter-row">
      <div class="op-chips" id="opChips" aria-label="Operators"></div>
      <label class="field day-field">
        <span class="field-lbl">Day</span>
        <select id="daySel" aria-label="Day of week"></select>
      </label>
      <label class="field sort-field">
        <span class="field-lbl">Sort</span>
        <select id="sortSel" aria-label="Sort by">
          <option value="dep">Departure time</option>
          <option value="dur">Duration</option>
          <option value="fare">Fare</option>
        </select>
      </label>
      <button id="clearBtn" class="ghost-btn">Clear</button>
    </div>
  </section>

  <div class="statbar" id="statbar"></div>

  <main class="results" id="results"></main>

  <footer class="foot">
    <p id="footNote"></p>
    <p>Source: <a href="https://data.gov.gr" target="_blank" rel="noopener">data.gov.gr</a> · National Access Point.
       Schedules &amp; fares are a static snapshot — <strong>always verify with the operator before travel.</strong></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
